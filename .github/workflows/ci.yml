name: CI

on:
  pull_request:
  merge_group:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
   contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  geoengine-test:
    name: "geoengine / test"
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      # TODO: Get Cache back
      # - name: setup rust build cache
      #   uses: Swatinem/rust-cache@v2
      #   with:
      #     # An explicit cache key that is used instead of the automatic `job`-based
      #     # cache key and is thus stable across jobs.
      #     # Default: empty
      #     shared-key: ""

      #     # An additional cache key that is added alongside the automatic `job`-based
      #     # cache key and can be used to further differentiate jobs.
      #     # Default: empty
      #     key: ci_test_
      - name: Testsuite
        uses: ./.github/actions/test
      - name: Adjust lcov.info
        # The lcov file is generated in the container and contains absolute paths, so we need to adjust them.
        run: sed -i 's|/github/workspace/||g' geoengine/lcov.info
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: geoengine/lcov.info
          fail-on-error: false # do not fail the workflow if the upload fails

  geoengine-lint:
    name: "geoengine / lint"
    
    runs-on: ubuntu-24.04
    container: quay.io/geoengine/devcontainer:latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - uses: extractions/setup-just@v3
      - name: Init rustup toolchain
        # somehow rustup show will take care to initialize the version based on the toolchain file
        run: rustup show
      - name: setup rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          # An explicit cache key that is used instead of the automatic `job`-based
          # cache key and is thus stable across jobs.
          # Default: empty
          shared-key: ""

          # An additional cache key that is added alongside the automatic `job`-based
          # cache key and can be used to further differentiate jobs.
          # Default: empty
          key: ci_test_
      - name: Rustfmt
        run: just backend lint-rustfmt
      - name: Clippy
        run: just backend lint-clippy
      - name: SQLFluff
        run: just backend lint-sql

  openapi:
    name: OpenAPI Validation

    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - uses: extractions/setup-just@v3
      - name: Validate OpenAPI spec
        run: just validate-openapi-spec

  geoengine-build:
    name: "geoengine / build"

    runs-on: ubuntu-24.04
    container: quay.io/geoengine/devcontainer:latest

    permissions:
      contents: read

    strategy:
      matrix:
        build: ["", "--release"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - uses: extractions/setup-just@v3
      - name: Init rustup toolchain
        # somehow rustup show will take care to initialize the version based on the toolchain file
        run: rustup show
      - name: setup rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          # An explicit cache key that is used instead of the automatic `job`-based
          # cache key and is thus stable across jobs.
          # Default: empty
          shared-key: ""

          # An additional cache key that is added alongside the automatic `job`-based
          # cache key and can be used to further differentiate jobs.
          # Default: empty
          key: ci_test_${{ matrix.build }}
      - name: Build
        run: just backend build "${{ matrix.build }}"
  
  python:
    runs-on: ubuntu-24.04
    container: quay.io/geoengine/devcontainer:latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        # use all supported versions from https://devguide.python.org/versions/
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        uv: [false]
        module-resolution: [""]
        coverage: [false]
        include:
          - python-version: "3.10" # always test the minimum version
            uv: true
            module-resolution: "--resolution=lowest-direct"
            coverage: true

    env:
      USE_UV: ${{ matrix.uv }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - uses: extractions/setup-just@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        if: ${{ matrix.uv }}
        run: just python install-uv
      - name: Virtual environment
        run: just python install-venv
      - name: Dev dependencies
        run: just python install-dependencies "dev" "${{ matrix.module-resolution }}"
      - name: Lints
        run: just python lint-code
        # TODO: fix issues with mypy and uv
        if: ${{ !matrix.uv }}
      - name: Test dependencies
        run: just python install-dependencies "test" "${{ matrix.module-resolution }}"
      - name: Test Lints
        run: just python lint-tests
        # TODO: fix issues with mypy and uv
        if: ${{ !matrix.uv }}
      - name: Start PostgreSQL
        run: service postgresql start
      - name: Tests
        run: >
          just python test
          --build-type=release
          ${{ matrix.coverage && '--coverage' || '' }}
      - name: Example dependencies
        run: just python install-dependencies "examples" "${{ matrix.module-resolution }}"
      - name: Examples
        run: >
          just python run-examples
          --build-type=release
          ${{ matrix.coverage && '--coverage' || '' }}
      - name: Report coverage to Coveralls
        if: ${{ matrix.coverage }}
        # 1. We need to adjust the paths in the lcov file to match the repository structure.
        # 2. We need to download the coveralls script and upload the report.
        run: |
          sed -i 's|SF:geoengine/|SF:|' ../coverage.lcov
          curl -sL https://coveralls.io/coveralls-linux.tar.gz | tar -xz
          ./coveralls report ../coverage.lcov
        # If we don't run it in the code folder, the paths in the report will prefixed with `library/geoengine/`.
        working-directory: python/geoengine
        env:
          COVERALLS_REPO_TOKEN: ${{ github.token }}
  
  www:
    runs-on: ubuntu-24.04
    container: quay.io/geoengine/devcontainer:latest

    permissions:
      contents: read

    steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - uses: extractions/setup-just@v3
        - name: Install
          run: just www install
        - name: Check formatting and lints
          run: just www lint
        - name: Build
          run: just www build
