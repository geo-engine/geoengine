name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main # For generating code coverage on main branch
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
   contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  geoengine-test:
    name: "geoengine / test"
    runs-on: ubuntu-24.04

    outputs:
      coverage-artifact-id: ${{ steps.upload-coverage-artifact.outputs.artifact-id }}

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Init rustup toolchain
        # initialize based on the toolchain file
        run: rustup toolchain install
      - name: Setup Rust Build Cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "cache-rust"
          shared-key: "test"
          add-job-id-key: false
          env-vars: ""
          workspaces: "geoengine"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Testsuite
        uses: ./.github/actions/test
      - id: upload-coverage-artifact
        uses: actions/upload-artifact@v7
        with:
          name: lcov-report-backend-${{ github.run_id }}-${{ github.run_attempt }}
          path: geoengine/lcov.info
          compression-level: 9
          retention-days: 3
          if-no-files-found: error

  geoengine-lint:
    name: "geoengine / lint"
    
    runs-on: ubuntu-24.04
    container: quay.io/geoengine/devcontainer:latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Init rustup toolchain
        # initialize based on the toolchain file
        run: rustup toolchain install
      - name: Setup Rust Build Cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "cache-rust"
          shared-key: "lint"
          add-job-id-key: false
          env-vars: ""
          workspaces: "geoengine"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Rustfmt
        run: just backend lint-rustfmt
      - name: Clippy
        run: just backend lint-clippy
      - name: SQLFluff
        run: just backend lint-sql

  geoengine-build:
    name: "geoengine / build"

    runs-on: ubuntu-24.04
    container: quay.io/geoengine/devcontainer:latest

    permissions:
      contents: read

    strategy:
      matrix:
        build: ["", "--release"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Init rustup toolchain
        # initialize based on the toolchain file
        run: rustup toolchain install
      - name: Setup Rust Build Cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "cache-rust"
          shared-key: "build${{ matrix.build }}"
          add-job-id-key: false
          env-vars: ""
          workspaces: "geoengine"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build
        run: just backend build "${{ matrix.build }}"
      - name: Prepare service for validation
        id: prepare-service
        env:
          SERVER_PORT: 3030
          PROXY_PORT: 8123
          SERVER_URL: "http://localhost:3030"
          PROXY_URL: "http://localhost:8123"
        run: |
          service postgresql start
          
          GEOENGINE__WEB__EXTERNAL_ADDRESS="$PROXY_URL/api" \
            cargo run &
          just common wait-for-port $SERVER_PORT

          SESSION_TOKEN=$(curl -s -X POST $SERVER_URL/api/anonymous | jq -r '.id')
          DATA_CONNECTOR_ID=cbb21ee3-d15d-45c5-a175-66964adf4e85
          LAYER_ID=$(curl -s \
              --header "Accept: application/json" \
              --header "Authorization: Bearer $SESSION_TOKEN" \
              "$SERVER_URL/api/layers/collections/$DATA_CONNECTOR_ID/tags%3A%2A?offset=0&limit=20" \
              | jq -r '.items[] | select(.name == "NDVI") | .id.layerId')
          
          request-logging-proxy \
            --target-url $SERVER_URL \
            --port $PROXY_PORT \
            --override-bearer-auth $SESSION_TOKEN \
            --logger dev-null \
            &
          
          just common wait-for-port $PROXY_PORT

          # set outputs for the next steps
          echo "DATA_CONNECTOR_ID=$DATA_CONNECTOR_ID" >> $GITHUB_OUTPUT
          echo "LAYER_ID=$LAYER_ID" >> $GITHUB_OUTPUT
      - name: Validate service
        uses: geo-engine/ogc-validator@v3
        with:
          ogc-api-processes: false
          ogc-api-features: false
          ogc-api-tiles: true
          service-url: ${{ env.PROXY_URL }}/api/ogc/${{ steps.prepare-service.outputs.DATA_CONNECTOR_ID }}/${{ steps.prepare-service.outputs.LAYER_ID }}
          ogc-api-tiles-tilematrixsetdefinitionurl: "http://www.opengis.net/def/tilematrixset/OGC/1.0/WebMercatorQuad"
          ogc-api-tiles-urltemplatefortiles: "${{ env.PROXY_URL }}/api/ogc/${{ steps.prepare-service.outputs.DATA_CONNECTOR_ID }}/${{ steps.prepare-service.outputs.LAYER_ID }}/collections/${{ steps.prepare-service.outputs.LAYER_ID }}/map/tiles/GeoEngineCustomTMS/{tileMatrix}/{tileRow}/{tileCol}?datetime=2014-04-01T00:00:00Z"
          ogc-api-tiles-tilematrix: "0"
          ogc-api-tiles-mintilerow: "0"
          ogc-api-tiles-maxtilerow: "1"
          ogc-api-tiles-mintilecol: "0"
          ogc-api-tiles-maxtilecol: "1"
          ogc-api-tiles-ignore: "verifyMinimalConformance"
        env:
          PROXY_URL: "http://localhost:8123"
  
  python:
    runs-on: ubuntu-24.04
    container: quay.io/geoengine/devcontainer:latest

    permissions:
      contents: read

    outputs:
      coverage-artifact-id: ${{ steps.upload-coverage-artifact.outputs.artifact-id }}

    strategy:
      fail-fast: false
      matrix:
        # use all supported versions from https://devguide.python.org/versions/
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        uv: [false]
        module-resolution: [""]
        coverage: [false]
        include:
          - python-version: "3.10" # always test the minimum version
            uv: true
            module-resolution: "--resolution=lowest-direct"
            coverage: true

    env:
      USE_UV: ${{ matrix.uv }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Init rustup toolchain
        # initialize based on the toolchain file
        run: rustup toolchain install
      - name: Setup Rust Build Cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "cache-rust"
          # re-use cache of build job, since it both calls `cargo build` in debug mode
          shared-key: "build"
          add-job-id-key: false
          env-vars: ""
          workspaces: "geoengine"
          # build job already saves the cache, so we can skip saving here
          save-if: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        if: ${{ matrix.uv }}
        run: just python install-uv
      - name: Virtual environment
        run: just python install-venv
      - name: Dev dependencies
        run: just python install-dependencies "dev" "${{ matrix.module-resolution }}"
      - name: Lints
        run: just python lint-code
        # TODO: fix issues with mypy and uv
        if: ${{ !matrix.uv }}
      - name: Test dependencies
        run: just python install-dependencies "test" "${{ matrix.module-resolution }}"
      - name: Test Lints
        run: just python lint-tests
        # TODO: fix issues with mypy and uv
        if: ${{ !matrix.uv }}
      - name: Start PostgreSQL
        run: service postgresql start
      - name: Tests
        run: >
          just python test
          --build-type=debug
          ${{ matrix.coverage && '--coverage' || '' }}
      - name: Example dependencies
        run: just python install-dependencies "examples" "${{ matrix.module-resolution }}"
      - name: Examples
        run: >
          just python run-examples
          --build-type=debug
          ${{ matrix.coverage && '--coverage' || '' }}
      - id: upload-coverage-artifact
        if: ${{ matrix.coverage }}
        uses: actions/upload-artifact@v7
        with:
          name: lcov-report-python-${{ github.run_id }}-${{ github.run_attempt }}
          path: python/coverage.lcov
          compression-level: 9
          retention-days: 1
          if-no-files-found: error
  
  www:
    runs-on: ubuntu-24.04
    container: quay.io/geoengine/devcontainer:latest

    permissions:
      contents: read

    steps:
        - name: Checkout code
          uses: actions/checkout@v6
        - name: Install
          run: just www install
        - name: Check formatting and lints
          run: just www lint
        - name: Build
          run: just www build
        - name: Idempotency check
          run: just common check-no-changes-in-git-repo


  api-client-python:
    name: "api-client / python"

    runs-on: ubuntu-24.04
    container: quay.io/geoengine/devcontainer:latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Generate OpenAPI spec
        run: just api-clients test-python

  api-client-typescript:
    name: "api-client / typescript"

    runs-on: ubuntu-24.04
    container: quay.io/geoengine/devcontainer:latest

    strategy:
      matrix:
        node-version: [20.19.x, 22.12.x, 24.0.x]

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install and build
        run: just api-clients test-typescript

  api-client-rust:
    name: "api-client / rust"

    runs-on: ubuntu-24.04
    container: quay.io/geoengine/devcontainer:latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Build and test
        run: just api-clients test-rust

  api-client-idempotency:
    name: "api-client / rust"

    runs-on: ubuntu-24.04
    container: quay.io/geoengine/devcontainer:latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - name: Install Java (OpenAPI Generator requires Java to run)
        run: |
          # deleted in devcontainer image, but required by java installer
          mkdir -p /usr/share/man/man1
          apt-get update
          apt-get install -y openjdk-21-jre-headless
      - name: Lint OpenAPI specification
        run: just api-clients lint-openapi-spec
      - name: Generate API clients
        run: just api-clients build
      - name: Check for changes in git repo
        run: just common check-no-changes-in-git-repo

  ui-build:
    name: "ui / build"
    runs-on: ubuntu-24.04
    container: quay.io/geoengine/devcontainer:latest

    permissions:
      contents: read

    strategy:
      matrix:
        app:
          - gis
          - manager
          - dashboards/gfbio
          - dashboards/data-atlas
          - dashboards/nfdi-portal-demo
          - dashboards/ebv-analyzer
          - dashboards/ecometrics
          - dashboards/esg-indicator-service
    
    steps:
      - uses: actions/checkout@v6
      - name: Install Dependencies
        run: just ui install
      - name: Build app ${{ matrix.app }}
        run: just ui build ${{ matrix.app }}
        env:
          CI: true
  
  ui-test:
    name: "ui / test"
    runs-on: ubuntu-24.04
    container: quay.io/geoengine/devcontainer:latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - name: Install Dependencies
        run: just ui install --with-deps
      - run: just ui test --ci
        env:
          CI: true
      # TODO: coverage for UI tests

  ui-lint:
    name: "ui / lint"

    runs-on: ubuntu-24.04
    container: quay.io/geoengine/devcontainer:latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Dependencies
        run: just ui install
      - name: Code Format Check with Prettier
        run: just ui format
      - name: Build common & core
        run: |
          just ui build common
          just ui build core
      - name: Check with Linter
        run: just ui lint

  repository-lint:
    name: "repository / lint"

    runs-on: ubuntu-24.04
    container: quay.io/geoengine/devcontainer:latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - name: Lint repository-wide formats & versions
        run: just ci repo

  repository-coverage:
    name: "repository / coverage"

    needs: 
      - geoengine-test
      - python

    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Download Backend Coverage Report
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ needs.geoengine-test.outputs.coverage-artifact-id }}
          path: geoengine/
      - name: Download Python Coverage Report
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ needs.python.outputs.coverage-artifact-id }}
          path: python/
      - name: Modify lcov paths
        run: |
          sed -i 's|/github/workspace/geoengine/||g' geoengine/lcov.info
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-error: false # do not fail the workflow if the upload fails
