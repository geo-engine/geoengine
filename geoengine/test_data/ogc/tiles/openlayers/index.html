<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OGC Map Tiles</title>
    <link rel="stylesheet" href="node_modules/ol/ol.css" />
    <style>
      html,
      body {
        margin: 0;
        overflow: hidden;
      }

      body {
        display: flex;
        gap: 12px;
        padding: 12px;
        box-sizing: border-box;
        min-height: 100vh;
      }

      .map-panel {
        flex: 1 1 0;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .map-title {
        margin: 0 0 8px 0;
        font: 600 16px/1.4 sans-serif;
      }

      .map {
        width: 100%;
        height: calc(100vh - 44px);
      }

      @media (max-width: 900px) {
        body {
          flex-direction: column;
        }

        .map {
          height: 50vh;
        }
      }
    </style>
  </head>
  <body>
    <section class="map-panel">
      <h2 class="map-title">WGS84</h2>
      <div id="wgs84Map" class="map"></div>
    </section>
    <section class="map-panel">
      <h2 class="map-title">WebMercator</h2>
      <div id="webMercatorMap" class="map"></div>
    </section>

    <script type="module" src="main.js"></script>
  </body>
</html>
