[package]
name = "geoengine-api-client"
version = "0.9.1"
authors = ["dev@geoengine.de"]
description = "No description provided (generated by Openapi Generator https://github.com/openapitools/openapi-generator)"
license = "Apache-2.0"
edition = "2021"
repository = "https://github.com/geo-engine/geoengine"
homepage = "https://www.geoengine.io"

[dependencies]
serde = { version = "^1.0", features = ["derive"] }
serde_with = { version = "^3.8", default-features = false, features = ["base64", "std", "macros"] }
serde_json = "^1.0"
serde_repr = "^0.1"
url = "^2.5"
uuid = { version = "^1.8", features = ["serde", "v4"] }
tokio = { version = "^1.46.0", features = ["fs"] }
tokio-util = { version = "^0.7", features = ["codec"] }
reqwest = { version = "^0.13", default-features = false, features = ["json", "multipart", "stream", "query", "form"] }

[features]
default = ["native-tls"]
native-tls = ["reqwest/native-tls"]
rustls = ["reqwest/rustls"]
